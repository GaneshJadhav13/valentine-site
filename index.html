<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Proposal 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(270deg, #ff9a9e, #fad0c4, #ffdde1);
    background-size: 600% 600%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

h1 {
    margin-top: 80px;
    color: white;
}

.container {
    position: relative;
    height: 60vh;
}

.btn {
    padding: 12px 25px;
    font-size: 18px;
    margin: 15px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
}

#yesBtn { background: #28a745; color: white; }
#noBtn { background: #dc3545; color: white; position: absolute; }

.celebration {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}

.typing {
    font-size: 24px;
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
}

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1 id="question">Will you be my Valentine? ❤️</h1>

<div class="container" id="mainBox">
    <button id="yesBtn" class="btn">Yes 💖</button>
    <button id="noBtn" class="btn">No 😢</button>
</div>

<div class="celebration" id="celebration">
    <h1 id="title"></h1>
    <div class="typing" id="typingText"></div>
    <button class="btn" onclick="location.reload()">Play Again 🔁</button>
</div>

<audio id="music" preload="auto">
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const music = document.getElementById("music");

let yesSize = 18;

// Move NO button
function moveButton() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    yesSize += 5;
    yesBtn.style.fontSize = yesSize + "px";
}

noBtn.addEventListener("mouseover", moveButton);

// 🎶 Smooth Fade-in Music
function fadeInMusic() {
    music.volume = 0;
    music.play().catch(()=>{});

    let vol = 0;
    let interval = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else {
            clearInterval(interval);
        }
    }, 200);
}

// 💬 Typing Effect
function typeText(text) {
    let i = 0;
    const el = document.getElementById("typingText");
    el.innerHTML = "";

    let typing = setInterval(() => {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
        } else {
            clearInterval(typing);
        }
    }, 50);
}

// 💕 Hearts
function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

// YES click
yesBtn.addEventListener("click", () => {

    fadeInMusic();

    let name = prompt("Enter your name 💖:") || "Love";

    document.getElementById("mainBox").style.display = "none";
    document.getElementById("question").style.display = "none";

    document.getElementById("celebration").style.display = "flex";

    document.getElementById("title").innerText = `Yayyyy ${name}! 💖`;

    typeText("You made my day 😍❤️ Best decision ever 😉");

    createHearts();
});
</script>

</body>
</html>
